<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password — Policy Yatra</title>
    <link rel="stylesheet" href="./auth-forms.css" />
  </head>
  <body>
    <div class="py-auth-card" data-auth-form="forgot-password">
      <div class="py-auth-card__header">
        <h1 class="py-auth-card__title">Forgot Password</h1>
        <p class="py-auth-card__subtitle">
          Enter your mobile number to reset password
        </p>
      </div>
      <form class="py-auth-card__body">
        <div class="py-auth-field">
          <label class="py-auth-label" for="forgot-mobile">Mobile Number*</label>
          <input
            class="py-auth-input"
            id="forgot-mobile"
            type="tel"
            inputmode="numeric"
            placeholder="Enter Mobile Number"
            autocomplete="tel"
          />
        </div>
        <div class="py-auth-field">
          <label class="py-auth-label" for="forgot-otp">OTP*</label>
          <input
            class="py-auth-input"
            id="forgot-otp"
            type="text"
            inputmode="numeric"
            placeholder="Enter OTP"
            autocomplete="one-time-code"
          />
        </div>
        <div class="py-auth-field">
          <label class="py-auth-label" for="forgot-new-password"
            >New Password*</label
          >
          <input
            class="py-auth-input"
            id="forgot-new-password"
            type="password"
            placeholder="Enter New Password"
            autocomplete="new-password"
          />
        </div>
        <button class="py-auth-submit" type="submit">
          <span class="py-auth-submit__text">RESET PASSWORD</span>
          <span class="py-auth-submit__arrow">
            <img src="../public/CTA1.svg" alt="" />
          </span>
        </button>
        <p class="py-auth-footer">
          Remember your password?
          <button
            class="py-auth-link"
            type="button"
            data-auth-show="login-password"
          >
            Back to Login
          </button>
        </p>
      </form>
    </div>
    <script src="./form-nav.js"></script>
  </body>
</html>
