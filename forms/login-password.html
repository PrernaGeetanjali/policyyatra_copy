<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login with Password — Policy Yatra</title>
    <link rel="stylesheet" href="./auth-forms.css" />
  </head>
  <body>
    <div class="py-auth-card" data-auth-form="login-password">
      <div class="py-auth-card__header">
        <h1 class="py-auth-card__title">Login</h1>
        <p class="py-auth-card__subtitle">Welcome! on board with us</p>
      </div>
      <form class="py-auth-card__body">
        <div class="py-auth-tabs" role="tablist">
          <button
            class="py-auth-tab"
            type="button"
            role="tab"
            aria-selected="false"
            data-auth-show="login-otp"
          >
            Login with OTP
          </button>
          <button
            class="py-auth-tab is-active"
            type="button"
            role="tab"
            aria-selected="true"
            data-auth-show="login-password"
          >
            Login with Password
          </button>
        </div>
        <div class="py-auth-field">
          <label class="py-auth-label" for="login-password-mobile"
            >Mobile Number*</label
          >
          <input
            class="py-auth-input"
            id="login-password-mobile"
            type="tel"
            inputmode="numeric"
            placeholder="Enter Mobile Number"
            autocomplete="tel"
          />
        </div>
        <div class="py-auth-field">
          <label class="py-auth-label" for="login-password-input"
            >Password*</label
          >
          <input
            class="py-auth-input"
            id="login-password-input"
            type="password"
            placeholder="Enter Password"
            autocomplete="current-password"
          />
        </div>
        <div class="py-auth-forgot-row">
          <button
            class="py-auth-link"
            type="button"
            data-auth-show="forgot-password"
          >
            Forgot Password?
          </button>
        </div>
        <button class="py-auth-submit" type="submit">
          <span class="py-auth-submit__text">LOGIN</span>
          <span class="py-auth-submit__arrow">
            <img src="../public/CTA1.svg" alt="" />
          </span>
        </button>
        <p class="py-auth-footer">
          Don't have an account?
          <button class="py-auth-link" type="button" data-auth-show="signup">
            Register
          </button>
        </p>
      </form>
    </div>
    <script src="./form-nav.js"></script>
  </body>
</html>
